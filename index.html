<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinhala Explorer • Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Noto+Sans+SC&amp;display=swap');
        
        :root {
            --map-height: 100vh;
        }
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
        }
        
        #map {
            height: 100vh;
            width: 100%;
        }
        
        .leaflet-popup-content-wrapper {
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
        }
        
        /* Glassmorphism panel */
        #side-panel {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(24px);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: -20px 0 30px -10px rgb(0 0 0 / 0.4);
            transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1);
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .tail-text {
            font-family: 'Noto Sans SC', system_ui, sans-serif;
        }
        
        /* Spinner */
        .spinner {
            width: 28px;
            height: 28px;
            border: 4px solid rgba(163, 163, 163, 0.2);
            border-top-color: #22c55e;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .wiki-extract {
            font-size: 1.05rem;
            line-height: 1.7;
            max-height: 420px;
            overflow-y: auto;
            scrollbar-width: thin;
        }
        
        .wiki-extract::-webkit-scrollbar {
            width: 6px;
        }
        
        .wiki-extract::-webkit-scrollbar-thumb {
            background: rgba(163, 163, 163, 0.3);
            border-radius: 20px;
        }
    </style>
</head>
<body class="bg-zinc-950 text-white overflow-hidden">
    <!-- Map Container -->
    <div id="map" class="absolute inset-0 z-0"></div>

    <!-- Side History Panel -->
    <div id="side-panel" 
         class="fixed top-0 right-0 bottom-0 w-full md:w-96 translate-x-full flex flex-col z-50 rounded-l-3xl overflow-hidden">
        
        <!-- Panel Header -->
        <div class="flex items-center justify-between px-6 py-5 border-b border-white/10 bg-black/30">
            <div class="flex items-center gap-x-3">
                <div class="w-8 h-8 bg-emerald-500 rounded-2xl flex items-center justify-center text-white text-xl">📍</div>
                <div>
                    <span class="text-emerald-400 text-sm font-medium tracking-widest">SINHALA WIKIPEDIA</span>
                    <h2 class="text-xl font-semibold">Place History</h2>
                </div>
            </div>
            <button onclick="hidePanel()" 
                    class="w-9 h-9 flex items-center justify-center hover:bg-white/10 rounded-2xl transition-colors text-2xl leading-none">
                ×
            </button>
        </div>

        <!-- Panel Content -->
        <div id="panel-content" class="flex-1 p-6 overflow-y-auto">
            <!-- Filled by JavaScript -->
        </div>

        <!-- Footer hint -->
        <div class="px-6 py-4 text-xs text-zinc-500 border-t border-white/10 text-center">
            Click anywhere on the map to explore
        </div>
    </div>

    <!-- Floating instruction (hidden after first click) -->
    <div id="instruction" 
         class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-zinc-900/90 text-zinc-400 text-sm px-6 py-3 rounded-3xl flex items-center gap-x-3 shadow-2xl z-40 backdrop-blur-xl border border-white/10 transition-opacity">
        <span class="text-emerald-400">👆</span>
        <span>Click any location on the map</span>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Tailwind script already loaded via CDN
        
        let map;
        let currentMarker = null;
        let panelOpen = false;
        let firstClick = true;

        // Initialize Leaflet map centered on Sri Lanka
        function initMap() {
            map = L.map('map', {
                zoomControl: true,
                attributionControl: true
            }).setView([7.8731, 80.7718], 8); // Sri Lanka center

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap contributors',
                className: 'map-tiles'
            }).addTo(map);

            // Click handler
            map.on('click', handleMapClick);
        }

        // Main click handler
        async function handleMapClick(e) {
            const { lat, lng } = e.latlng;

            // Add marker
            if (currentMarker) map.removeLayer(currentMarker);
            currentMarker = L.marker([lat, lng], {
                riseOnHover: true
            }).addTo(map);

            // Show panel
            showPanel();

            // Show loading state
            showLoading();

            // Hide instruction after first click
            if (firstClick) {
                document.getElementById('instruction').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('instruction').style.display = 'none';
                }, 800);
                firstClick = false;
            }

            try {
                // 1. Reverse geocoding with Nominatim (OpenStreetMap)
                const nominatimURL = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1`;
                const nomRes = await fetch(nominatimURL);
                const nomData = await nomRes.json();

                // Get best possible place name for Wikipedia lookup
                const address = nomData.address || {};
                let queryTitle = address.city ||
                                 address.town ||
                                 address.village ||
                                 address.hamlet ||
                                 address.suburb ||
                                 address.state_district ||
                                 nomData.display_name.split(',')[0].trim();

                if (!queryTitle) queryTitle = "Sri Lanka";

               
                // 2. Fetch from English Wikipedia REST API
const wikiURL = `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(queryTitle)}`;
const wikiRes = await fetch(wikiURL, {
    headers: {
        'User-Agent': 'SinhalaExplorer/1.0 (your.email@example.com)'  // Wikipedia එක recommend කරනවා User-Agent දාන්න
    }
});

if (!wikiRes.ok) {
    if (wikiRes.status === 404) {
        throw new Error("no-article");
    }
    throw new Error("fetch-failed");
}

const wikiData = await wikiRes.json();

// Render...

                // Render beautiful panel
                renderWikiData(wikiData, lat, lng);

            } catch (error) {
                console.error(error);
                let message = "Something went wrong.";
                
                if (error.message === "no-article") {
                    message = "No Sinhala Wikipedia article found for this location.<br>Try clicking near a major city or town.";
                } else {
                    message = "Could not fetch Wikipedia data at this time.";
                }
                
                showError(message);
            }
        }

        function showLoading() {
            const content = document.getElementById('panel-content');
            content.innerHTML = `
                <div class="flex flex-col items-center justify-center h-full py-20">
                    <div class="spinner mx-auto mb-6"></div>
                    <p class="text-zinc-400 text-sm tracking-widest">LOADING FROM SINHALA WIKIPEDIA...</p>
                </div>
            `;
        }

        function renderWikiData(data, lat, lng) {
            const content = document.getElementById('panel-content');
            
            const title = data.displaytitle || data.title;
            const summary = data.extract || "No description available in Sinhala Wikipedia.";
            const thumbnail = data.thumbnail ? data.thumbnail.source : null;
            const pageURL = `https://si.wikipedia.org/wiki/${encodeURIComponent(data.title)}`;

            let html = `
                <div class="glass-card rounded-3xl p-6 mb-6">
                    <h1 class="text-3xl font-bold leading-tight tail-text mb-4">${title}</h1>
                    
                    <!-- Coordinates -->
                    <div class="flex items-center gap-x-2 text-xs text-emerald-400 mb-6">
                        <span>📍</span>
                        <span>${lat.toFixed(4)}°N, ${lng.toFixed(4)}°E</span>
                    </div>
            `;

            // Thumbnail
            if (thumbnail) {
                html += `
                    <div class="rounded-2xl overflow-hidden mb-6 shadow-inner">
                        <img src="${thumbnail}" 
                             alt="${title}"
                             class="w-full h-auto object-cover">
                    </div>
                `;
            }

            html += `
                    <!-- Summary -->
                    <div class="wiki-extract text-zinc-200 pr-2">
                        ${summary}
                    </div>
                </div>

                <!-- Read More Button -->
                <a href="${pageURL}" 
                   target="_blank"
                   class="block w-full bg-white text-zinc-900 hover:bg-emerald-400 hover:text-white transition-all font-semibold py-4 rounded-3xl text-center text-lg shadow-lg shadow-emerald-500/20 flex items-center justify-center gap-x-2">
                    <span>Read Full Article</span>
                    <span class="text-xl">→</span>
                </a>

                <p class="text-center text-[10px] text-zinc-500 mt-8">
                    Powered by si.wikipedia.org REST API
                </p>
            `;

            content.innerHTML = html;
        }

        function showError(msg) {
            const content = document.getElementById('panel-content');
            content.innerHTML = `
                <div class="flex flex-col items-center justify-center h-full py-12 text-center">
                    <div class="w-16 h-16 bg-red-500/10 rounded-3xl flex items-center justify-center mb-6 text-4xl">⚠️</div>
                    <p class="text-red-300 text-xl font-medium mb-3">No data found</p>
                    <p class="text-zinc-400 max-w-[260px]">${msg}</p>
                    
                    <button onclick="hidePanel()" 
                            class="mt-10 px-8 py-3 text-sm border border-white/30 hover:border-white/60 rounded-3xl transition-colors">
                        CLOSE PANEL
                    </button>
                </div>
            `;
        }

        function showPanel() {
            const panel = document.getElementById('side-panel');
            panel.style.transform = 'translateX(0)';
            panelOpen = true;
        }

        function hidePanel() {
            const panel = document.getElementById('side-panel');
            panel.style.transform = 'translateX(100%)';
            panelOpen = false;
            
            // Optional: remove marker after closing
            // setTimeout(() => {
            //     if (currentMarker) map.removeLayer(currentMarker);
            //     currentMarker = null;
            // }, 600);
        }

        // Keyboard escape support
        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape" && panelOpen) {
                hidePanel();
            }
        });

        // Initialize everything
        window.onload = function() {
            // Tailwind ready
            initMap();
            
            // Show initial instruction
            setTimeout(() => {
                const instr = document.getElementById('instruction');
                instr.style.transition = 'all 1s cubic-bezier(0.4, 0, 0.2, 1)';
            }, 1200);
        };
    </script>
</body>
</html>
