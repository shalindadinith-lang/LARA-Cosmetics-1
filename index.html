<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LK Explorer • Interactive Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5n/N0ZDv4=" crossorigin=""/>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Sinhala:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0f172a;
      --glass: rgba(30, 41, 59, 0.72);
      --border: rgba(148, 163, 184, 0.18);
      --accent: #10b981;
      --text: #e2e8f0;
      --text-dim: #94a3b8;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
    }

    #map {
      height: 100vh;
      width: 100%;
    }

    /* Dark elegant map filter */
    .leaflet-container {
      background: #0d1117;
    }
    .dark-map-filter {
      filter: invert(92%) hue-rotate(180deg) brightness(90%) contrast(85%);
      mix-blend-mode: lighten;
    }

    /* Enhanced Glassmorphism */
    .glass {
      background: var(--glass);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid var(--border);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    .glass-strong {
      background: rgba(15, 23, 42, 0.88);
      backdrop-filter: blur(28px);
      border: 1px solid rgba(100, 116, 139, 0.3);
    }

    /* Panel animation */
    #side-panel {
      transform: translateX(100%);
      transition: transform 0.6s cubic-bezier(0.32, 0.72, 0, 1);
    }
    #side-panel.open {
      transform: translateX(0);
    }

    /* Fade-in content */
    .fade-in {
      opacity: 0;
      animation: fadeInUp 0.7s forwards ease-out;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .wiki-extract {
      font-family: 'Noto Sans Sinhala', 'Inter', sans-serif;
      font-size: 1.05rem;
      line-height: 1.75;
      max-height: 55vh;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #475569 #1e293b;
    }
    .wiki-extract::-webkit-scrollbar {
      width: 6px;
    }
    .wiki-extract::-webkit-scrollbar-thumb {
      background: #475569;
      border-radius: 3px;
    }

    /* Spinner */
    .loader {
      width: 48px;
      height: 48px;
      border: 5px solid #334155;
      border-top: 5px solid var(--accent);
      border-radius: 50%;
      animation: spin 1.1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Hover shine effect on button */
    .btn-shine {
      position: relative;
      overflow: hidden;
    }
    .btn-shine::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -100%;
      width: 50%;
      height: 200%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.25), transparent);
      transition: left 0.6s;
    }
    .btn-shine:hover::after {
      left: 120%;
    }
  </style>
</head>
<body class="antialiased">

  <!-- Fullscreen Map -->
  <div id="map" class="dark-map-filter"></div>

  <!-- Slide-in Side Panel -->
  <div id="side-panel" class="fixed top-0 right-0 h-full w-full md:w-96 z-50 glass-strong flex flex-col overflow-hidden">

    <!-- Header -->
    <div class="flex items-center justify-between px-6 py-5 border-b border-slate-700/50 bg-black/30">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-emerald-600/80 flex items-center justify-center text-2xl shadow-lg">🗺️</div>
        <div>
          <span class="text-emerald-400 text-xs font-semibold tracking-wider uppercase">Wikipedia Explorer</span>
          <h2 class="text-2xl font-bold">Place Story</h2>
        </div>
      </div>
      <button onclick="hidePanel()" class="w-10 h-10 flex items-center justify-center text-3xl hover:text-emerald-400 transition-colors rounded-full hover:bg-slate-800/50">
        ×
      </button>
    </div>

    <!-- Content Area -->
    <div id="panel-content" class="flex-1 p-6 overflow-y-auto space-y-8">

      <!-- JS will fill this -->

    </div>

    <!-- Tiny footer -->
    <div class="px-6 py-4 text-xs text-slate-500 border-t border-slate-700/50 text-center bg-black/20">
      Powered by English Wikipedia • Click map to discover
    </div>
  </div>

  <!-- Floating hint (disappears after first click) -->
  <div id="hint" class="fixed bottom-6 left-1/2 -translate-x-1/2 glass px-8 py-4 rounded-2xl shadow-2xl flex items-center gap-4 z-40 transition-all duration-700">
    <span class="text-2xl">👆</span>
    <span class="font-medium">Tap / Click anywhere on the map</span>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script>
    let map, currentMarker = null;
    let panel = document.getElementById('side-panel');
    let content = document.getElementById('panel-content');
    let hint = document.getElementById('hint');
    let firstClick = true;

    function initMap() {
      map = L.map('map', { zoomControl: true }).setView([7.8731, 80.7718], 8);

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
      }).addTo(map);

      map.on('click', onMapClick);
    }

    async function onMapClick(e) {
      const { lat, lng } = e.latlng;

      // Marker
      if (currentMarker) map.removeLayer(currentMarker);
      currentMarker = L.marker([lat, lng], { riseOnHover: true }).addTo(map);

      showPanel();
      showLoading();

      if (firstClick) {
        hint.classList.add('opacity-0', 'scale-95');
        setTimeout(() => hint.style.display = 'none', 700);
        firstClick = false;
      }

      try {
        // Reverse geocode
        const nom = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=16&addressdetails=1`);
        const nomData = await nom.json();

        let title = nomData.address?.city ||
                    nomData.address?.town ||
                    nomData.address?.village ||
                    nomData.address?.suburb ||
                    nomData.address?.state_district ||
                    nomData.display_name.split(',')[0].trim() || "Sri Lanka";

        // English Wikipedia summary
        const wikiRes = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title)}`, {
          headers: { 'User-Agent': 'LK-Explorer/1.0 (contact@example.com)' }
        });

        if (!wikiRes.ok) {
          if (wikiRes.status === 404) throw new Error("no-article");
          throw new Error("fetch-error");
        }

        const data = await wikiRes.json();
        renderContent(data, lat, lng);

      } catch (err) {
        console.error(err);
        let msg = "Something went wrong…";
        if (err.message === "no-article") {
          msg = "No Wikipedia article found for this place.<br>Try a larger town or famous landmark.";
        }
        showError(msg);
      }
    }

    function showLoading() {
      content.innerHTML = `
        <div class="flex flex-col items-center justify-center h-full py-20 text-center">
          <div class="loader mb-8"></div>
          <p class="text-slate-400 tracking-wide">Fetching from Wikipedia...</p>
        </div>
      `;
    }

    function renderContent(data, lat, lng) {
      const title = data.displaytitle || data.title;
      const extract = data.extract_html || data.extract || "No summary available.";
      const img = data.thumbnail?.source || null;
      const url = `https://en.wikipedia.org/wiki/${encodeURIComponent(data.title)}`;

      let html = `<div class="space-y-6 fade-in">`;

      html += `
        <h1 class="text-3xl md:text-4xl font-bold leading-tight">${title}</h1>

        <div class="flex items-center gap-3 text-sm text-emerald-400/90">
          <span class="text-lg">📍</span>
          <span>${lat.toFixed(5)}°N, ${lng.toFixed(5)}°E</span>
        </div>
      `;

      if (img) {
        html += `
          <div class="rounded-2xl overflow-hidden shadow-2xl border border-slate-700/40">
            <img src="${img}" alt="${title}" class="w-full h-auto object-cover">
          </div>
        `;
      }

      html += `
        <div class="wiki-extract prose prose-invert prose-headings:text-slate-200 prose-a:text-emerald-400">
          ${extract}
        </div>

        <a href="${url}" target="_blank" rel="noopener"
           class="btn-shine block w-full bg-emerald-600 hover:bg-emerald-500 text-white font-semibold py-4 px-6 rounded-xl text-center text-lg shadow-lg shadow-emerald-900/40 transition-all duration-300">
          Read Full Article →
        </a>
      `;

      html += `</div>`;
      content.innerHTML = html;
    }

    function showError(msg) {
      content.innerHTML = `
        <div class="flex flex-col items-center justify-center h-full py-16 text-center fade-in">
          <div class="w-20 h-20 rounded-full bg-red-900/30 flex items-center justify-center text-5xl mb-6">⚠️</div>
          <h3 class="text-2xl font-semibold text-red-300 mb-4">No Data Found</h3>
          <p class="text-slate-300 max-w-xs">${msg}</p>
          <button onclick="hidePanel()" class="mt-10 px-10 py-3 border border-slate-600 hover:border-slate-400 rounded-xl transition">
            Close Panel
          </button>
        </div>
      `;
    }

    function showPanel() {
      panel.classList.add('open');
    }

    function hidePanel() {
      panel.classList.remove('open');
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') hidePanel();
    });

    window.addEventListener('load', () => {
      initMap();
      setTimeout(() => {
        hint.classList.remove('opacity-0', 'scale-95');
      }, 800);
    });
  </script>
</body>
</html>
